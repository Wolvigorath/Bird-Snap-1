<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bird Snap PRO - Magiczna Podłoga</title>
<link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; touch-action: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; display: none; }
        .label { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        #score { color: #ffeb3b; font-size: 1.4rem; }
        #level-tag { background: #f44336; padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }

        #time-container { width: 200px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 10px; position: relative; }
        #time-bar { height: 100%; background: #ff9800; width: 100%; transition: width 0.1s; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; color: white; z-index: 30; text-align: center;
        }
        #start-screen { z-index: 40; }
        #game-over-screen { display: none; }

        .instructions { text-align: left; background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; max-width: 400px; width: 90%; }
        .instructions p { margin: 5px 0; }
        
        .settings-panel { border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; }
        .setting-row { display: flex; flex-direction: column; margin-bottom: 15px; }
        .setting-row label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; color: #ccc; }
        .setting-row input[type="range"] { width: 100%; margin: 0; }
        
        #highscore-box { background: #222; padding: 15px; border-radius: 10px; margin: 15px 0; width: 250px; text-align: left; }
        #highscore-list { margin: 0; padding-left: 20px; }
        #highscore-list li { margin-bottom: 5px; color: #ffeb3b; font-weight: bold; }
        
        input[type="text"] { padding: 10px; font-size: 1rem; border-radius: 5px; border: none; margin-bottom: 10px; width: 230px; text-align: center; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #4caf50; border: none; color: white; border-radius: 5px; font-weight: bold; margin: 5px; }
        .btn-secondary { background: #f44336; font-size: 1rem; padding: 10px 20px; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let r of registrations) r.unregister();
            });
            if ('caches' in window) {
                caches.keys().then(keys => {
                    keys.forEach(key => caches.delete(key));
                });
            }
        }
    </script>
</head>
<body>

<div id="start-screen" class="screen">
    <h1>BIRD SNAP PRO</h1>
    <div class="instructions">
        <p>🕹️ <b>STEROWANIE:</b> Kliknij / stań na ptaku z sekwencji</p>
        
        <div class="settings-panel">
            <div class="setting-row">
                <label>Długość sekwencji: <span id="val-seq">3</span></label>
                <input type="range" id="cfg-seq" min="1" max="5" step="1" value="3">
            </div>
            <div class="setting-row">
                <label>Zoom (przybliżenie): <span id="val-zoom">0.30</span></label>
                <input type="range" id="cfg-zoom" min="0.05" max="1.2" step="0.05" value="0.30">
            </div>
            <div class="setting-row">
                <label>Czas ucieczki: <span id="val-timer">500</span></label>
                <input type="range" id="cfg-timer" min="200" max="1500" step="50" value="500">
            </div>
            <div class="setting-row">
                <label>Ilość ptaków na raz: <span id="val-count">18</span></label>
                <input type="range" id="cfg-count" min="1" max="30" step="1" value="18">
            </div>
            <div class="setting-row">
                <label>Spadek światła: <span id="val-drain">0.05</span></label>
                <input type="range" id="cfg-drain" min="0.01" max="0.15" step="0.01" value="0.05">
            </div>
        </div>
    </div>
    <button onclick="startGame()">START GRY</button>
</div>

<div id="game-over-screen" class="screen">
    <h1>KONIEC DNIA</h1>
    <p id="over-score" style="font-size: 1.5rem; margin: 5px 0;">Wynik: 0</p>
    
    <div id="highscore-box">
        <h3 style="margin-top:0; text-align:center;">TOP 5</h3>
        <ol id="highscore-list"></ol>
    </div>

    <input type="text" id="player-name" placeholder="Twoje imię" maxlength="12">
    <button onclick="saveHighscore()">ZAPISZ I GRAJ</button>
    <button class="btn-secondary" onclick="resetGame()">GRAJ BEZ ZAPISU</button>
</div>

<div id="ui">
    <div class="label">PUNKTY: <span id="score">0</span> <span id="level-tag">POZIOM 1</span></div>
    <div class="label">ŚWIATŁO:</div>
    <div id="time-container"><div id="time-bar"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level-tag');
    const timeBar = document.getElementById('time-bar');
    
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const ui = document.getElementById('ui');
    
    const overScore = document.getElementById('over-score');
    const highscoreList = document.getElementById('highscore-list');
    const playerNameInput = document.getElementById('player-name');

    let cfgSeq = 3;
    let cfgTimer = 500;
    let cfgCount = 18;
    let cfgDrain = 0.05;
    let currentZoom = 0.30; 

    document.getElementById('cfg-seq').addEventListener('input', (e) => {
        cfgSeq = parseInt(e.target.value);
        document.getElementById('val-seq').innerText = cfgSeq;
    });

    document.getElementById('cfg-zoom').addEventListener('input', (e) => {
        currentZoom = parseFloat(e.target.value);
        document.getElementById('val-zoom').innerText = currentZoom.toFixed(2);
        resize(); 
    });

    document.getElementById('cfg-timer').addEventListener('input', (e) => {
        cfgTimer = parseInt(e.target.value);
        document.getElementById('val-timer').innerText = cfgTimer;
    });
    document.getElementById('cfg-count').addEventListener('input', (e) => {
        cfgCount = parseInt(e.target.value);
        document.getElementById('val-count').innerText = cfgCount;
    });
    document.getElementById('cfg-drain').addEventListener('input', (e) => {
        cfgDrain = parseFloat(e.target.value);
        document.getElementById('val-drain').innerText = cfgDrain.toFixed(2);
    });

    let width, height;
    let WORLD_W = 3000;
    let WORLD_H = 1800;

    let bgLoaded = false;
    const bgImg = new Image();
    bgImg.onload = () => { bgLoaded = true; if (!gameActive) drawScene(); };
    bgImg.src = "background.jpg";

    const birdSets = [];
    for(let i = 1; i <= 6; i++) {
        let p = new Image(); p.src = 'bird' + i + '.png';
        let f = new Image(); f.src = 'bird' + i + '2.png';
        birdSets.push({ perched: p, flying: f });
    }
    
    let score = 0;
    let level = 1;
    let daylight = 100;
    let gameActive = false;

    let currentCamX = WORLD_W / 2;
    let currentCamY = WORLD_H / 2;

    let birds = [];
    let huntTargetSequence = [];
    let currentSequenceIdx = 0;

    let spawnCooldown = 0;
    let shutterState = 'idle'; 
    let shutterVal = 0; 

    let trees = [];
    let leaves = [];

    // System klikania / stąpania
    canvas.addEventListener('pointerdown', (e) => {
        if (!gameActive || shutterState !== 'idle' || huntTargetSequence.length === 0) return;

        const rect = canvas.getBoundingClientRect();
        
        // Przeliczenie kliknięcia na pozycję w świecie (uwzględniając przesunięcie i zoom)
        const clickX = currentCamX + (e.clientX - rect.left - width / 2) / currentZoom;
        const clickY = currentCamY + (e.clientY - rect.top - height / 2) / currentZoom;

        let hitLeaf = false;
        for(let i=0; i<leaves.length; i++) {
            let dist = Math.hypot(clickX - leaves[i].x, clickY - leaves[i].y);
            if (dist < leaves[i].s * 1.5) {
                hitLeaf = true;
                leaves.splice(i, 1);
                break;
            }
        }

        if (hitLeaf) {
            playSound('error');
            score = Math.max(0, score - 5);
            scoreEl.innerText = score;
            return; 
        }

        let hitBirdIdx = -1;
        for(let i = 0; i < birds.length; i++) {
            if(!birds[i].active) continue;
            let dist = Math.hypot(clickX - birds[i].x, clickY - birds[i].y);
            let hitRadius = birds[i].size * 2.5; // Hitbox
            if (dist < hitRadius) {
                hitBirdIdx = i;
                break;
            }
        }

        if (hitBirdIdx !== -1) {
            playSound('shutter');
            shutterState = 'closing';
            
            let shotBird = birds[hitBirdIdx];
            let currentTarget = huntTargetSequence[currentSequenceIdx];
            
            if (shotBird.birdSet === currentTarget.birdSet) {
                playSound('success');
                currentTarget.done = true;
                currentSequenceIdx++;
                score += Math.round(10 * level);
                daylight = Math.min(100, daylight + 5);
                
                shotBird.active = false; // Usuwa trafionego ptaka
                
                // Sprawdzanie czy cała sekwencja została zrobiona
                if (currentSequenceIdx >= huntTargetSequence.length) {
                    score += 50; // Bonus za całą sekwencję
                    daylight = Math.min(100, daylight + 20);
                    
                    if (score > 150 && level === 1) { level = 2; levelEl.innerText = "POZIOM 2"; }
                    if (score > 400 && level === 2) { level = 3; levelEl.innerText = "POZIOM 3"; }
                    
                    // Resetowanie planszy i sekwencji
                    huntTargetSequence = [];
                    spawnCooldown = 10; 
                    birds.forEach(b => {
                        b.active = false;
                        b.timer = Math.min(b.timer, 0); 
                    });
                }
            } else {
                playSound('error');
                score = Math.max(0, score - 15);
                daylight = Math.max(0, daylight - 10);
            }
            
            scoreEl.innerText = score;
        }
    });

    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'shutter') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'success') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554, now + 0.05);
            osc.frequency.setValueAtTime(659, now + 0.1);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }

    let highscores = [];
    try {
        let saved = localStorage.getItem('birdSnapPL');
        if (saved) highscores = JSON.parse(saved);
    } catch (e) {}

    function renderHighscores() {
        highscoreList.innerHTML = '';
        highscores.forEach(entry => {
            let li = document.createElement('li');
            li.innerText = `${entry.name} - ${entry.score}`;
            highscoreList.appendChild(li);
        });
        if(highscores.length === 0) highscoreList.innerHTML = '<li>Brak wyników</li>';
    }

    function saveHighscore() {
        let name = playerNameInput.value.trim() || "Gość";
        highscores.push({ name: name, score: score });
        highscores.sort((a, b) => b.score - a.score);
        highscores = highscores.slice(0, 5); 
        try { localStorage.setItem('birdSnapPL', JSON.stringify(highscores)); } catch (e) {}
        resetGame();
    }

    function initEnvironment() {
        trees = [];
        for(let i=0; i<30; i++) {
            trees.push({
                x: Math.random() * WORLD_W,
                y: WORLD_H - 100 - (Math.random() * 400),
                s: 180 + Math.random() * 300
            });
        }
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        // Dynamiczne dopasowanie świata do widoku
        WORLD_W = width / currentZoom;
        WORLD_H = height / currentZoom;
        currentCamX = WORLD_W / 2;
        currentCamY = WORLD_H / 2;
        
        if(!gameActive) {
            initEnvironment();
            drawScene();
        }
    }
    window.addEventListener('resize', resize);

    function startGame() {
        initAudio();
        startScreen.style.display = 'none';
        ui.style.display = 'block';
        resetGame();
    }

    function endGame() {
        gameActive = false;
        ui.style.display = 'none';
        gameOverScreen.style.display = 'flex';
        overScore.innerText = `Twój wynik: ${score}`;
        playerNameInput.value = '';
        renderHighscores();
    }

    function resetGame() {
        score = 0; level = 1; daylight = 100; gameActive = true; spawnCooldown = 0; shutterState = 'idle'; shutterVal = 0;
        scoreEl.innerText = "0"; levelEl.innerText = "POZIOM 1";
        gameOverScreen.style.display = 'none';
        ui.style.display = 'block';
        leaves = [];
        birds = [];
        huntTargetSequence = [];
        currentSequenceIdx = 0;
        currentCamX = WORLD_W / 2;
        currentCamY = WORLD_H / 2;
        resize();
        requestAnimationFrame(update);
    }

    function drawBird(birdObj) {
        ctx.save();
        ctx.translate(birdObj.x, birdObj.y);
        
        if (birdObj.vx < 0 || (birdObj.vx === 0 && Math.sin(birdObj.x) > 0)) ctx.scale(-1, 1); 
        
        let currentImg = birdObj.perched ? birdObj.birdSet.perched : birdObj.birdSet.flying;
        if (currentImg && currentImg.complete && currentImg.naturalWidth !== 0) {
            let imgSize = birdObj.size * 5; 
            ctx.drawImage(currentImg, -imgSize/2, -imgSize/2, imgSize, imgSize);
        }
        ctx.restore();
    }

    function drawScene() {
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        
        ctx.translate(width/2, height/2);
        ctx.scale(currentZoom, currentZoom);
        ctx.translate(-currentCamX, -currentCamY);

        ctx.fillStyle = "#87ceeb";
        ctx.fillRect(-10000, -10000, WORLD_W + 20000, WORLD_H + 20000);

        if (bgLoaded) {
            ctx.drawImage(bgImg, -5000, -3000, WORLD_W + 10000, WORLD_H + 6000);
        }

        birds.forEach(b => drawBird(b));

        ctx.fillStyle = "rgb(129, 199, 132)";
        for(let i = leaves.length - 1; i >= 0; i--) {
            let l = leaves[i];
            if(gameActive) {
                l.x += l.vx + Math.sin(Date.now()/300 + l.y)*1.5;
                l.y += l.vy;
            }
            ctx.save();
            ctx.translate(l.x, l.y);
            ctx.rotate(Date.now()/500 + l.x);
            ctx.scale(1, 0.5); 
            ctx.beginPath();
            ctx.arc(0, 0, l.s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            if(l.y > WORLD_H + 50) leaves.splice(i, 1);
        }

        let darkness = Math.max(0, 1 - (daylight / 100));
        ctx.fillStyle = `rgba(0, 0, 0, ${darkness * 0.8})`;
        ctx.fillRect(-10000, -10000, WORLD_W + 20000, WORLD_H + 20000);

        ctx.restore(); 

        // Rysowanie sekwencji celów (interfejs 2D, niezależnie od kamery)
        if (gameActive && huntTargetSequence.length > 0) {
            ctx.save();
            let startX = width - 50 - ((huntTargetSequence.length - 1) * 70); 
            ctx.translate(startX, 50); 
            
            for(let i = 0; i < huntTargetSequence.length; i++) {
                let seqItem = huntTargetSequence[i];
                
                // Tło ikony
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.fill();
                
                // Rysunek ptaka
                if (seqItem.birdSet.perched.complete) {
                    ctx.drawImage(seqItem.birdSet.perched, -25, -25, 50, 50);
                }
                
                // Obramowanie - żółte jeśli aktualne, białe jeśli oczekuje
                ctx.strokeStyle = i === currentSequenceIdx ? "#ffeb3b" : "white";
                ctx.lineWidth = i === currentSequenceIdx ? 5 : 2;
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.stroke();
                
                // Zielony "ptaszek" jeśli trafione
                if (seqItem.done) {
                    ctx.strokeStyle = "#4caf50";
                    ctx.lineWidth = 6;
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(-4, 12);
                    ctx.lineTo(16, -14);
                    ctx.stroke();
                }
                
                // Przesunięcie do następnej ikonki
                ctx.translate(70, 0); 
            }
            ctx.restore();

            // Animacja migawki
            if (shutterState === 'closing') {
                shutterVal += 0.25;
                if (shutterVal >= 1) { shutterVal = 1; shutterState = 'opening'; }
            } else if (shutterState === 'opening') {
                shutterVal -= 0.10;
                if (shutterVal <= 0) { shutterVal = 0; shutterState = 'idle'; }
            }

            if (shutterVal > 0) {
                let maxR = Math.max(width, height);
                let holeR = maxR * (1 - shutterVal);
                ctx.beginPath();
                ctx.arc(width/2, height/2, holeR + maxR/2, 0, Math.PI*2);
                ctx.lineWidth = maxR;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }
        }
    }

    function update() {
        if (!gameActive) return;

        daylight -= cfgDrain * level;
        timeBar.style.width = Math.max(0, daylight) + "%";
        if (daylight <= 0) {
            endGame();
            return;
        }

        if (Math.random() < 0.04 + (level*0.01)) {
            leaves.push({
                x: Math.random() * WORLD_W,
                y: -50,
                vx: (Math.random() - 0.5) * 4,
                vy: 2 + Math.random() * 4,
                s: 15 + Math.random() * 20
            });
        }

        let uiZoneW = 350 / currentZoom;
        let uiZoneH = 120 / currentZoom;

        for (let i = birds.length - 1; i >= 0; i--) {
            let b = birds[i];
            b.timer--;
            
            if (!b.perched) {
                b.x += b.vx;
                b.y += b.vy;
                
                // Kolizje ogólne (ściany)
                if(b.x < 80) { b.x = 80; b.vx = Math.abs(b.vx); }
                else if(b.x > WORLD_W - 80) { b.x = WORLD_W - 80; b.vx = -Math.abs(b.vx); }
                
                if(b.y < 80) { b.y = 80; b.vy = Math.abs(b.vy); }
                else if(b.y > WORLD_H - 80) { b.y = WORLD_H - 80; b.vy = -Math.abs(b.vy); }
                
                // Kolizja ze strefą UI (lewy górny róg) - ptaki odbijają w dół
                if (b.x < uiZoneW && b.y < uiZoneH) {
                    b.y = uiZoneH;
                    b.vy = Math.abs(b.vy);
                }

            } else {
                b.y += Math.sin(Date.now()/500 + b.x)*0.2;
            }

            if (b.timer <= 0 && b.active) { 
                playSound('error');
                score = Math.max(0, score - 5); 
                scoreEl.innerText = score;
                
                // Resetowanie tylko pojedynczego ptaka żeby poleciał na nowo,
                // a nie całości, by gracz nie tracił zbudowanej sekwencji przez 1 ptaka
                b.active = false;
                b.perched = false; 
                b.timer = Math.min(b.timer, 0); 
                b.vx = (Math.random() - 0.5) * 40;
                b.vy = (Math.random() - 0.5) * 40;
                
                // Wymuś uzupełnienie
                spawnCooldown = 1;
            }

            if (b.timer < -30) { 
                birds.splice(i, 1);
            }
        }

        let activeBirds = birds.filter(b => b.active);
        // Generujemy jeśli jest za mało ptaków w stosunku do cfgCount
        if (activeBirds.length < cfgCount && gameActive) {
            spawnCooldown--;
            if (spawnCooldown <= 0) {
                
                let setsPool = [];
                while(setsPool.length < cfgCount) {
                    setsPool = setsPool.concat([...birdSets].sort(() => Math.random() - 0.5));
                }
                
                let toSpawn = cfgCount - activeBirds.length;
                for (let i = 0; i < toSpawn; i++) {
                    const isPerched = Math.random() < 0.5; 
                    let spawnX, spawnY;

                    if (isPerched && trees.length > 0) {
                        const tree = trees[Math.floor(Math.random() * trees.length)];
                        spawnX = tree.x;
                        spawnY = tree.y - (Math.random() * tree.s * 0.8) - 10; 
                    } else {
                        spawnX = 150 + Math.random() * (WORLD_W - 300);
                        spawnY = 150 + Math.random() * (WORLD_H - 300);
                    }
                    
                    // Zabezpieczenie przed spawnem w UI
                    if (spawnX < uiZoneW && spawnY < uiZoneH) {
                        spawnX = uiZoneW + 100;
                        spawnY = uiZoneH + 100;
                    }

                    const baseSize = Math.max(40, 55 - level);
                    const uniqueSize = baseSize * (0.85 + Math.random() * 0.3);

                    birds.push({
                        x: spawnX,
                        y: spawnY, 
                        vx: isPerched ? 0 : (Math.random() - 0.5) * 12 * level,
                        vy: isPerched ? 0 : (Math.random() - 0.5) * 8 * level,
                        size: uniqueSize, 
                        timer: cfgTimer / level, 
                        birdSet: setsPool[i],
                        active: true,
                        perched: isPerched 
                    });
                }
                
                // Budowa sekwencji (tylko z unikalnych ptaków widocznych na ekranie), 
                // robi to tylko jeśli sekwencja jest pusta (nowa runda)
                if (huntTargetSequence.length === 0) {
                    let uniqueSets = [...new Set(birds.map(b => b.birdSet))].sort(() => Math.random() - 0.5);
                    let seqLength = Math.min(cfgSeq, uniqueSets.length);
                    huntTargetSequence = uniqueSets.slice(0, seqLength).map(set => ({ birdSet: set, done: false }));
                    currentSequenceIdx = 0;
                }
            }
        }

        drawScene();
        requestAnimationFrame(update);
    }
    
    resize();
</script>
</body>
