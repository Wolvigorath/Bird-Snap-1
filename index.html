<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bird Snap PRO - Therapeutic Version</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; display: none; }
        .label { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        #score { color: #ffeb3b; font-size: 1.4rem; }
        #level-tag { background: #f44336; padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }
        #time-container { width: 200px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 10px; position: relative; }
        #time-bar { height: 100%; background: #ff9800; width: 100%; transition: width 0.1s; }
        #snap-btn { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; display: none; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; font-size: 1.1rem; background: rgba(244, 67, 54, 0.5); z-index: 10; }
        #joystick-zone { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255,255,255,0.3); display: none; z-index: 10; touch-action: none; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; border-radius: 50%; background: rgba(255, 255, 255, 0.5); transform: translate(-50%, -50%); pointer-events: none; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; color: white; z-index: 30; text-align: center; }
        #start-screen { z-index: 40; }
        #game-over-screen { display: none; }
        .instructions { text-align: left; background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; max-width: 400px; width: 90%; }
        .settings-panel { border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; }
        .setting-row { display: flex; flex-direction: column; margin-bottom: 15px; }
        .setting-row label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; color: #ccc; }
        .setting-row input[type="range"] { width: 100%; margin: 0; }
        #highscore-box { background: #222; padding: 15px; border-radius: 10px; margin: 15px 0; width: 250px; text-align: left; }
        #highscore-list { margin: 0; padding-left: 20px; }
        input[type="text"] { padding: 10px; font-size: 1rem; border-radius: 5px; border: none; margin-bottom: 10px; width: 230px; text-align: center; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #4caf50; border: none; color: white; border-radius: 5px; font-weight: bold; margin: 5px; }
        .btn-secondary { background: #f44336; font-size: 1rem; padding: 10px 20px; }
    </style>
</head>
<body>

<div id="start-screen" class="screen">
    <h1>BIRD SNAP PRO</h1>
    <div class="instructions">
        <p>🕹️ <b>CONTROLS:</b> Joystick (right thumb)</p>
        <p>🔴 <b>PHOTO:</b> Red button or <b>SPACE</b></p>
        <p>Target the bird shown in the top-right icon.</p>
        <div class="settings-panel">
            <div class="setting-row">
                <label>Zoom Level: <span id="val-zoom">0.50</span></label>
                <input type="range" id="cfg-zoom" min="0.3" max="1.5" step="0.05" value="0.50">
            </div>
            <div class="setting-row">
                <label>Escape Timer: <span id="val-timer">500</span></label>
                <input type="range" id="cfg-timer" min="200" max="1500" step="50" value="500">
            </div>
            <div class="setting-row">
                <label>Bird Count: <span id="val-count">4</span></label>
                <input type="range" id="cfg-count" min="1" max="6" step="1" value="4">
            </div>
            <div class="setting-row">
                <label>Light Drain: <span id="val-drain">0.05</span></label>
                <input type="range" id="cfg-drain" min="0.01" max="0.15" step="0.01" value="0.05">
            </div>
        </div>
    </div>
    <button onclick="startGame()">START GAME</button>
</div>

<div id="game-over-screen" class="screen">
    <h1>END OF DAY</h1>
    <p id="over-score" style="font-size: 1.5rem; margin: 5px 0;">Score: 0</p>
    <div id="highscore-box">
        <h3 style="margin-top:0; text-align:center;">TOP 5</h3>
        <ol id="highscore-list"></ol>
    </div>
    <input type="text" id="player-name" placeholder="Your Name" maxlength="12">
    <button onclick="saveHighscore()">SAVE & PLAY</button>
    <button class="btn-secondary" onclick="resetGame()">PLAY WITHOUT SAVING</button>
</div>

<div id="ui">
    <div class="label">POINTS: <span id="score">0</span> <span id="level-tag">LEVEL 1</span></div>
    <div class="label">LIGHT:</div>
    <div id="time-container"><div id="time-bar"></div></div>
</div>

<div id="snap-btn">PHOTO</div>
<div id="joystick-zone"><div id="joystick-stick"></div></div>
<canvas id="gameCanvas"></canvas>

<script>
    // CAŁA LOGIKA GRY (Zmieściłem najważniejsze funkcje)
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level-tag');
    const timeBar = document.getElementById('time-bar');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const ui = document.getElementById('ui');
    const snapBtn = document.getElementById('snap-btn');
    const joystickZone = document.getElementById('joystick-zone');
    const joystickStick = document.getElementById('joystick-stick');
    const highscoreList = document.getElementById('highscore-list');

    let cfgTimer = 500, cfgCount = 4, cfgDrain = 0.05, currentZoom = 0.50;
    let width, height, score = 0, level = 1, daylight = 100, gameActive = false;
    let currentCamX = 1500, currentCamY = 900;
    const WORLD_W = 3000, WORLD_H = 1800;

    document.getElementById('cfg-zoom').oninput = (e) => { currentZoom = parseFloat(e.target.value); document.getElementById('val-zoom').innerText = currentZoom.toFixed(2); if(!gameActive) drawScene(); };
    document.getElementById('cfg-timer').oninput = (e) => { cfgTimer = parseInt(e.target.value); document.getElementById('val-timer').innerText = cfgTimer; };
    document.getElementById('cfg-count').oninput = (e) => { cfgCount = parseInt(e.target.value); document.getElementById('val-count').innerText = cfgCount; };
    document.getElementById('cfg-drain').oninput = (e) => { cfgDrain = parseFloat(e.target.value); document.getElementById('val-drain').innerText = cfgDrain.toFixed(2); };

    // Joystick i sterowanie (skrócone)
    let joyActive = false, joyDX = 0, joyDY = 0, joyCenterX, joyCenterY;
    joystickZone.onpointerdown = (e) => { joyActive = true; const r = joystickZone.getBoundingClientRect(); joyCenterX = r.left + r.width/2; joyCenterY = r.top + r.height/2; e.preventDefault(); };
    window.onpointermove = (e) => { if(!joyActive) return; let dx = e.clientX - joyCenterX, dy = e.clientY - joyCenterY, dist = Math.hypot(dx, dy); if(dist > 40) { dx *= 40/dist; dy *= 40/dist; } joyDX = dx/40; joyDY = dy/40; joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; };
    window.onpointerup = () => { joyActive = false; joyDX = 0; joyDY = 0; joystickStick.style.transform = `translate(-50%, -50%)`; };
    snapBtn.onpointerdown = (e) => { e.preventDefault(); takePhoto(); };
    window.onkeydown = (e) => { if(e.code === 'Space') takePhoto(); };

    // Pozostała logika (inicjalizacja, ptaki, rysowanie)
    const birdColors = ['rgb(173,216,230)', 'rgb(76,175,80)', 'rgb(255,235,59)', 'rgb(244,67,54)', 'rgb(233,30,99)', 'rgb(255,152,0)'];
    let birds = [], trees = [], clouds = [], leaves = [], huntTargetColor = null, shutterState = 'idle', shutterVal = 0;

    function startGame() { startScreen.style.display = 'none'; ui.style.display = 'block'; snapBtn.style.display = 'flex'; joystickZone.style.display = 'block'; resetGame(); }
    function resetGame() { score = 0; level = 1; daylight = 100; gameActive = true; birds = []; leaves = []; resize(); requestAnimationFrame(update); }
    function endGame() { gameActive = false; ui.style.display = 'none'; snapBtn.style.display = 'none'; joystickZone.style.display = 'none'; gameOverScreen.style.display = 'flex'; document.getElementById('over-score').innerText = "Score: " + score; renderHighscores(); }

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; initEnv(); drawScene(); }
    function initEnv() { trees = []; for(let i=0; i<30; i++) trees.push({x: Math.random()*WORLD_W, y: WORLD_H-100-Math.random()*400, s: 180+Math.random()*300}); }

    function drawScene() {
        ctx.clearRect(0,0,width,height); ctx.save(); ctx.translate(width/2, height/2); ctx.scale(currentZoom, currentZoom); ctx.translate(-currentCamX, -currentCamY);
        ctx.fillStyle = "#87ceeb"; ctx.fillRect(-1000,-1000, WORLD_W+2000, WORLD_H+2000);
        ctx.fillStyle = "#388e3c"; ctx.fillRect(-1000, WORLD_H-100, WORLD_W+2000, 1000);
        trees.forEach(t => { ctx.fillStyle="#4e342e"; ctx.fillRect(t.x-t.s/10, t.y-t.s, t.s/5, t.s); ctx.fillStyle="#2e7d32"; ctx.beginPath(); ctx.arc(t.x, t.y-t.s, t.s/2, 0, 7); ctx.fill(); });
        birds.forEach(b => { ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, 7); ctx.fill(); });
        ctx.restore();
        if(gameActive) {
            ctx.strokeStyle = "rgba(255,0,0,0.5)"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(width/2, height/2, 45*2.5*currentZoom, 0, 7); ctx.stroke();
            if(huntTargetColor) { ctx.fillStyle=huntTargetColor; ctx.beginPath(); ctx.arc(width-50, 50, 20, 0, 7); ctx.fill(); }
        }
    }

    function update() {
        if(!gameActive) return;
        daylight -= cfgDrain * level; timeBar.style.width = daylight + "%";
        if(daylight <= 0) return endGame();
        currentCamX = Math.max(0, Math.min(WORLD_W, currentCamX + joyDX*25));
        currentCamY = Math.max(0, Math.min(WORLD_H, currentCamY + joyDY*25));
        if(birds.length === 0) spawnBirds();
        birds.forEach(b => { b.timer--; b.x += b.vx; b.y += b.vy; if(b.x<0 || b.x>WORLD_W) b.vx*=-1; if(b.timer<=0) birds = []; });
        drawScene(); requestAnimationFrame(update);
    }

    function spawnBirds() {
        const colors = [...birdColors].sort(() => Math.random()-0.5);
        for(let i=0; i<cfgCount; i++) birds.push({x: Math.random()*WORLD_W, y: Math.random()*WORLD_H, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, size: 45, color: colors[i], timer: cfgTimer});
        huntTargetColor = birds[0].color;
    }

    function takePhoto() {
        let hit = birds.find(b => Math.hypot(currentCamX-b.x, currentCamY-b.y) < b.size*2.5);
        if(hit && hit.color === huntTargetColor) { score += 10; daylight = Math.min(100, daylight+15); birds = []; }
        else { score = Math.max(0, score-5); }
        scoreEl.innerText = score;
    }

    function renderHighscores() { /* Tu logika zapisu highscore */ }
    window.onresize = resize; resize();

    // REJESTRACJA SERVICE WORKERA (DLA PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW Registered!', reg);
            }).catch(err => {
                console.log('SW Failed!', err);
            });
        });
    }
</script>
</body>
</html>
